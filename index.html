<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b12">
  <title>KESKÉ ?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0b0b12;
      --accent1:   #7c5cff;
      --accent2:   #22d3ee;
      --vert:      #16c47f;
      --rouge:     #ff4d5e;
      --jaune:     #ffd166;
      --ui: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --display: 'Anton', 'Arial Black', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      overflow: hidden;
      font-family: var(--ui);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    body {
      background:
        radial-gradient(120% 80% at 50% -10%, #1c1c33 0%, rgba(28,28,51,0) 55%),
        radial-gradient(90% 60% at 100% 110%, #16213a 0%, rgba(22,33,58,0) 60%),
        var(--bg);
    }

    .cache { display: none !important; }

    /* ============ MENU ============ */
    #menu {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px; padding: max(24px, env(safe-area-inset-top)) 24px 24px;
      overflow-y: auto;
    }
    .logo {
      font-family: var(--display);
      font-size: clamp(56px, 16vw, 120px);
      line-height: 0.9; letter-spacing: 0.02em;
      background: linear-gradient(120deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 6px 30px rgba(124,92,255,0.35));
      text-align: center;
    }
    .tagline {
      color: #9aa0b5; font-size: 15px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      margin-top: -6px;
    }
    .grille {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px; width: 100%; max-width: 460px; margin-top: 6px;
    }
    .btn-theme {
      appearance: none; cursor: pointer;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px; padding: 22px 16px;
      color: #fff; font-family: var(--ui);
      font-size: clamp(16px, 4.4vw, 20px); font-weight: 700;
      letter-spacing: 0.02em;
      backdrop-filter: blur(6px);
      transition: transform .1s ease, border-color .15s, background .15s;
    }
    .btn-theme:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.09); }
    .btn-theme:active { transform: scale(0.96); }
    .btn-theme .n { display:block; font-size: 12px; font-weight:600; color:#8b90a6; margin-top:4px; letter-spacing:.06em;}
    .btn-theme.tous {
      grid-column: 1 / -1;
      background: linear-gradient(120deg, var(--accent1), var(--accent2));
      border: none; color: #0b0b12; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .astuce {
      color: #71768c; font-size: 13px; font-weight: 500;
      text-align: center; margin-top: 4px;
    }

    /* ============ JEU ============ */
    #jeu { position: fixed; inset: 0; display: none; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 6;
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
      padding: max(12px, env(safe-area-inset-top)) 14px 12px;
      pointer-events: none;
    }
    .chip {
      pointer-events: auto;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; padding: 8px 14px;
      font-size: 15px; font-weight: 700; letter-spacing: .02em;
      backdrop-filter: blur(8px); color: #fff;
    }
    #score { color: var(--vert); border-color: rgba(22,196,127,0.4); }
    #nomTheme { color: #b9bed3; text-transform: uppercase; font-size: 12px; letter-spacing:.12em; font-weight:600;}
    #retour { border:none; cursor:pointer; font-size:18px; line-height:1; padding: 8px 13px; }

    #ecran {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* le mot est tourné à 90° pour se lire sur le côté (tel en paysage) */
    #rotor {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.35em;
      transform-origin: center center; will-change: transform;
    }
    #mot { display: flex; flex-direction: row; align-items: center; }
    .lettre {
      font-family: var(--display);
      font-size: 100px; line-height: 1;
      color: #fff; letter-spacing: 0.01em;
      text-shadow: 0 4px 26px rgba(0,0,0,0.5);
    }
    #desc {
      display: none; max-width: 7em; text-align: center;
      font-family: var(--ui); font-weight: 700;
      font-size: 26px; line-height: 1.15; color: var(--jaune);
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }

    /* boutons bas */
    #actions {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 6;
      display: flex; gap: 10px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    }
    .action {
      flex: 1; border: none; cursor: pointer; color: #fff;
      font-family: var(--ui); font-weight: 800; text-transform: uppercase;
      font-size: clamp(15px, 3.6vw, 19px); letter-spacing: .06em;
      padding: 16px 8px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .08s ease, filter .15s;
    }
    .action:active { transform: translateY(2px); filter: brightness(1.1); }
    .action.passe  { background: linear-gradient(180deg, #ff6673, var(--rouge)); }
    .action.trouve { background: linear-gradient(180deg, #2ee6a0, var(--vert)); }

    /* flash */
    #flash {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      opacity: 0; transition: opacity .18s ease;
    }
    #flash.on { opacity: .4; }
    #flash.vert  { background: radial-gradient(circle, var(--vert), transparent 70%); }
    #flash.rouge { background: radial-gradient(circle, var(--rouge), transparent 70%); }
  </style>
</head>
<body>

  <!-- MENU -->
  <div id="menu">
    <div class="logo">KESKÉ ?</div>
    <div class="tagline">Devine le mot sur ton front</div>
    <div class="grille" id="listeThemes"></div>
    <div class="astuce">📱 Tiens le téléphone en paysage sur ton front</div>
  </div>

  <!-- JEU -->
  <div id="jeu">
    <div id="flash"></div>
    <header id="hud">
      <div class="chip" id="score">✓ 0</div>
      <div class="chip" id="nomTheme"></div>
      <button class="chip" id="retour">☰</button>
    </header>
    <div id="ecran">
      <div id="rotor">
        <div id="mot"></div>
        <div id="desc"></div>
      </div>
    </div>
    <footer id="actions">
      <button class="action passe">⏭️ Passe</button>
      <button class="action trouve">Trouvé ✅</button>
    </footer>
  </div>

  <script>
    // ---------- thèmes de secours (si mots.json non chargeable) ----------
    var THEMES_DEFAUT = {
      "Animaux": ["CHAT","CHIEN","LICORNE","DRAGON","PINGOUIN","REQUIN","GIRAFE","ELEPHANT","DINOSAURE","PANDA"],
      "Personnages": ["PIRATE","ROBOT","SORCIERE","VAMPIRE","FANTOME","ZOMBIE","NINJA","COWBOY","ASTRONAUTE","CLOWN"],
      "Nourriture": ["BANANE","PIZZA","BURGER","SUSHI","CROISSANT","CHOCOLAT","FROMAGE","GLACE","TACOS","CREPE"]
    };

    var C = {
      themes: "dt_themes", theme: "dt_theme_actuel", mots: "dt_mots",
      sac: "dt_sac", mot: "dt_mot", score: "dt_score", total: "dt_total"
    };

    var THEMES = {};
    var MOTS = [], sac = [], score = 0, total = 0, themeActuel = null;

    var menuEl = document.getElementById("menu");
    var jeuEl  = document.getElementById("jeu");
    var listeThemesEl = document.getElementById("listeThemes");
    var rotorEl = document.getElementById("rotor");
    var motEl  = document.getElementById("mot");
    var descEl = document.getElementById("desc");
    var scoreEl = document.getElementById("score");
    var nomThemeEl = document.getElementById("nomTheme");
    var flashEl = document.getElementById("flash");

    // ---------- charge les thèmes (cache -> puis mots.json) ----------
    try {
      var tc = JSON.parse(localStorage.getItem(C.themes) || "null");
      if (tc && Object.keys(tc).length) THEMES = tc;
    } catch (e) {}
    if (!Object.keys(THEMES).length) THEMES = THEMES_DEFAUT;
    construireMenu();

    fetch("mots.json", { cache: "no-store" })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data && data.themes && Object.keys(data.themes).length) {
          THEMES = data.themes;
          localStorage.setItem(C.themes, JSON.stringify(THEMES));
          construireMenu();
        }
      })
      .catch(function () {});

    function construireMenu() {
      listeThemesEl.innerHTML = "";
      for (var nom in THEMES) {
        (function (n) {
          var nb = (THEMES[n] || []).length;
          var b = document.createElement("button");
          b.className = "btn-theme";
          b.innerHTML = n + '<span class="n">' + nb + ' mots</span>';
          b.addEventListener("click", function () { lancerTheme(n); });
          listeThemesEl.appendChild(b);
        })(nom);
      }
      var t = document.createElement("button");
      t.className = "btn-theme tous";
      t.textContent = "TOUS LES MOTS";
      t.addEventListener("click", function () { lancerTheme("__tous__"); });
      listeThemesEl.appendChild(t);
    }

    // transforme une entrée (chaîne ou {mot,desc}) en objet normalisé
    function normItem(e) {
      if (e && typeof e === "object") {
        return { mot: String(e.mot || "").toUpperCase(), desc: String(e.desc || "") };
      }
      return { mot: String(e).toUpperCase(), desc: "" };
    }

    function motsDuTheme(nom) {
      var brut;
      if (nom === "__tous__") {
        brut = [];
        for (var k in THEMES) brut = brut.concat(THEMES[k]);
      } else {
        brut = (THEMES[nom] || []).slice();
      }
      return brut.map(normItem);
    }

    // ---------- démarrage d'un thème ----------
    function lancerTheme(nom) {
      themeActuel = nom;
      MOTS = motsDuTheme(nom);
      sac = []; score = 0; total = 0;
      sauverEtat();
      localStorage.setItem(C.theme, nom);
      localStorage.setItem(C.mots, JSON.stringify(MOTS));
      localStorage.removeItem(C.mot);
      ouvrirJeu();
      motSuivant();
    }

    function ouvrirJeu() {
      menuEl.classList.add("cache");
      jeuEl.style.display = "block";
      nomThemeEl.textContent = (themeActuel === "__tous__") ? "TOUS" : themeActuel;
      majScore();
      garderEveille();
      passerPleinEcran();
    }
    function ouvrirMenu() {
      jeuEl.style.display = "none";
      menuEl.classList.remove("cache");
      localStorage.removeItem(C.theme);
      localStorage.removeItem(C.mot);
    }

    // ---------- sac mélangé (anti-répétition) ----------
    function melanger(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }
    function motSuivant() {
      if (!MOTS.length) return;
      if (!sac.length) sac = melanger(MOTS.slice());
      var item = normItem(sac.pop());
      localStorage.setItem(C.mot, JSON.stringify(item));
      sauverEtat();
      rendre(item);
    }

    // ---------- affichage + rotation 90° + mise à l'échelle ----------
    function rendre(item) {
      item = normItem(item);
      var mot = item.mot;
      motEl.innerHTML = "";
      for (var k = 0; k < mot.length; k++) {
        var d = document.createElement("span");
        d.className = "lettre";
        d.textContent = mot[k] === " " ? " " : mot[k];
        motEl.appendChild(d);
      }
      descEl.textContent = item.desc || "";
      descEl.style.display = item.desc ? "block" : "none";
      ajuster();
    }
    function ajuster() {
      // mesure à l'état naturel (sans transform)
      rotorEl.style.transform = "none";
      var w = rotorEl.offsetWidth, h = rotorEl.offsetHeight;
      if (!w || !h) return;
      // après rotation 90°, largeur écran <- h, hauteur écran <- w
      var availW = window.innerWidth  * 0.94;
      var availH = Math.max(window.innerHeight - 150, window.innerHeight * 0.55);
      var scale = Math.min(availW / h, availH / w);
      rotorEl.style.transform = "rotate(90deg) scale(" + scale + ")";
    }

    // ---------- actions ----------
    function trouve() { score++; total++; majScore(); flash("vert");  vibrer(30);        motSuivant(); }
    function passe()  {          total++; majScore(); flash("rouge"); vibrer([15,40,15]); motSuivant(); }
    function majScore() { scoreEl.textContent = "✓ " + score; sauverEtat(); }
    function flash(c) {
      flashEl.className = ""; void flashEl.offsetWidth;
      flashEl.className = c + " on";
      setTimeout(function () { flashEl.className = c; }, 180);
    }
    function vibrer(p) { if (navigator.vibrate) navigator.vibrate(p); }

    // ---------- persistance ----------
    function sauverEtat() {
      try {
        localStorage.setItem(C.sac, JSON.stringify(sac));
        localStorage.setItem(C.score, score);
        localStorage.setItem(C.total, total);
      } catch (e) {}
    }

    // ---------- restauration après refresh ----------
    (function restaurer() {
      var t = localStorage.getItem(C.theme);
      if (!t) return;
      themeActuel = t;
      try { MOTS = JSON.parse(localStorage.getItem(C.mots) || "[]"); } catch (e) { MOTS = []; }
      if (!MOTS.length) MOTS = motsDuTheme(t);
      try { sac = JSON.parse(localStorage.getItem(C.sac) || "[]") || []; } catch (e) { sac = []; }
      score = parseInt(localStorage.getItem(C.score) || "0", 10) || 0;
      total = parseInt(localStorage.getItem(C.total) || "0", 10) || 0;
      ouvrirJeu();
      var m = localStorage.getItem(C.mot);
      if (m) {
        var it; try { it = JSON.parse(m); } catch (e) { it = null; }
        rendre(it && typeof it === "object" ? it : { mot: String(m), desc: "" });
      } else { motSuivant(); }
    })();

    // ---------- écran allumé ----------
    var wl = null;
    function garderEveille() {
      if (!("wakeLock" in navigator) || wl) return;
      navigator.wakeLock.request("screen").then(function (l) {
        wl = l; l.addEventListener("release", function () { wl = null; });
      }).catch(function () {});
    }
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") garderEveille();
    });

    // ---------- plein écran + paysage ----------
    function passerPleinEcran() {
      var el = document.documentElement;
      if (!document.fullscreenElement && el.requestFullscreen) {
        el.requestFullscreen().then(function () {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock("landscape").catch(function () {});
          }
        }).catch(function () {});
      }
    }

    // ---------- boutons ----------
    document.querySelector(".action.trouve").addEventListener("click", trouve);
    document.querySelector(".action.passe").addEventListener("click", passe);
    document.getElementById("retour").addEventListener("click", ouvrirMenu);

    // ---------- swipe ----------
    var x0 = null, y0 = null;
    var zone = document.getElementById("ecran");
    zone.addEventListener("touchstart", function (e) {
      x0 = e.touches[0].clientX; y0 = e.touches[0].clientY;
    }, { passive: true });
    zone.addEventListener("touchend", function (e) {
      if (x0 === null) return;
      var dx = e.changedTouches[0].clientX - x0;
      var dy = e.changedTouches[0].clientY - y0;
      x0 = y0 = null;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) trouve(); else passe();
      }
    }, { passive: true });

    // ---------- clavier (test PC) ----------
    document.addEventListener("keydown", function (e) {
      if (jeuEl.style.display !== "block") return;
      if (e.code === "ArrowRight") { e.preventDefault(); trouve(); }
      if (e.code === "ArrowLeft")  { e.preventDefault(); passe(); }
      if (e.code === "Escape")     { ouvrirMenu(); }
    });

    // ---------- resize / rotation ----------
    window.addEventListener("resize", ajuster);
    window.addEventListener("orientationchange", function () { setTimeout(ajuster, 200); });
    // recalage quand la police Anton finit de charger
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(ajuster);
  </script>
</body>
</html>
