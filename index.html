<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b12">
  <title>KESKÉ ?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0b0b12;
      --accent1:   #7c5cff;
      --accent2:   #22d3ee;
      --vert:      #16c47f;
      --rouge:     #ff4d5e;
      --jaune:     #ffd166;
      --ui: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --display: 'Anton', 'Arial Black', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      overflow: hidden;
      font-family: var(--ui);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    body {
      background:
        radial-gradient(120% 80% at 50% -10%, #1c1c33 0%, rgba(28,28,51,0) 55%),
        radial-gradient(90% 60% at 100% 110%, #16213a 0%, rgba(22,33,58,0) 60%),
        var(--bg);
    }

    .cache { display: none !important; }

    /* ============ MENU ============ */
    #menu {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: max(20px, env(safe-area-inset-top)) 18px 0;
    }
    .logo {
      font-family: var(--display);
      font-size: clamp(44px, 12vw, 84px);
      line-height: 0.9; letter-spacing: 0.02em; text-align: center;
      background: linear-gradient(120deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 6px 30px rgba(124,92,255,0.35));
    }
    .tagline {
      color: #9aa0b5; font-size: 13px; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      margin: 2px 0 14px; text-align: center;
    }
    .barreMenu { width: 100%; max-width: 620px; display: flex; justify-content: flex-end; margin-bottom: 10px; }
    .mini {
      background: transparent; border: 1px solid rgba(255,255,255,0.16);
      color: #b9bed3; border-radius: 999px; padding: 7px 14px;
      font-family: var(--ui); font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .mini:active { transform: scale(0.96); }

    .grille {
      width: 100%; max-width: 620px;
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
      overflow-y: auto; padding-bottom: 12px; flex: 1;
      -webkit-overflow-scrolling: touch;
    }
    .carte {
      position: relative; text-align: left; cursor: pointer;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 16px; padding: 16px 16px;
      color: #fff; font-family: var(--ui);
      transition: transform .1s ease, border-color .15s, background .15s;
    }
    .carte:active { transform: scale(0.97); }
    .carte .titre { display: block; font-size: clamp(15px, 4vw, 18px); font-weight: 700; }
    .carte .n { display: block; font-size: 12px; font-weight: 600; color: #8b90a6; margin-top: 3px; }
    .carte .check {
      position: absolute; top: 12px; right: 12px;
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: transparent; transition: .15s;
    }
    .carte.on {
      border-color: var(--accent1);
      background: linear-gradient(135deg, rgba(124,92,255,0.18), rgba(34,211,238,0.10));
    }
    .carte.on .check { background: var(--accent1); border-color: var(--accent1); color: #fff; }

    #jouer {
      width: 100%; max-width: 620px; border: none; cursor: pointer;
      margin: 6px 0 max(14px, env(safe-area-inset-bottom));
      padding: 18px; border-radius: 18px;
      font-family: var(--ui); font-weight: 800; font-size: 18px;
      letter-spacing: 0.04em; text-transform: uppercase; color: #0b0b12;
      background: linear-gradient(120deg, var(--accent1), var(--accent2));
      box-shadow: 0 10px 30px rgba(124,92,255,0.3);
      transition: transform .08s ease, opacity .15s;
    }
    #jouer:active { transform: translateY(2px); }
    #jouer:disabled { opacity: 0.35; cursor: default; box-shadow: none; color: #fff;
      background: rgba(255,255,255,0.08); }

    /* ============ JEU ============ */
    #jeu { position: fixed; inset: 0; display: none; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 6;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: max(12px, env(safe-area-inset-top)) 14px 12px; pointer-events: none;
    }
    .chip {
      pointer-events: auto;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; padding: 8px 14px;
      font-size: 15px; font-weight: 700; letter-spacing: .02em;
      backdrop-filter: blur(8px); color: #fff;
    }
    #score { color: var(--vert); border-color: rgba(22,196,127,0.4); }
    #nomTheme { color: #b9bed3; text-transform: uppercase; font-size: 12px; letter-spacing:.12em; font-weight:600;}
    #retour { border:none; cursor:pointer; font-size:18px; line-height:1; padding: 8px 13px; }

    #ecran {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    #rotor {
      display: flex; flex-direction: column; align-items: center; gap: 0.35em;
      transform-origin: center center; will-change: transform;
    }
    #mot { display: flex; flex-direction: row; align-items: center; }
    .lettre {
      font-family: var(--display); font-size: 100px; line-height: 1;
      color: #fff; letter-spacing: 0.01em; text-shadow: 0 4px 26px rgba(0,0,0,0.5);
    }
    #desc {
      display: none; max-width: 22em; text-align: center; white-space: nowrap;
      font-family: var(--ui); font-weight: 500;
      font-size: 14px; line-height: 1.25;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #8b90a6; text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    #actions {
      position: fixed; left: 0; right: 0; z-index: 6;
      bottom: calc(14px + env(safe-area-inset-bottom));
      display: flex; justify-content: center; gap: 28px;
    }
    .action {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      transition: transform .08s ease, background .15s, border-color .15s;
    }
    .action svg { width: 24px; height: 24px; }
    .action:active { transform: scale(0.9); }
    .action.passe  { color: var(--rouge); }
    .action.trouve { color: var(--vert); }
    .action.passe:hover  { border-color: rgba(255,77,94,0.5);  background: rgba(255,77,94,0.10); }
    .action.trouve:hover { border-color: rgba(22,196,127,0.5); background: rgba(22,196,127,0.10); }

    #flash {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      opacity: 0; transition: opacity .18s ease;
    }
    #flash.on { opacity: .4; }
    #flash.vert  { background: radial-gradient(circle, var(--vert), transparent 70%); }
    #flash.rouge { background: radial-gradient(circle, var(--rouge), transparent 70%); }
  </style>
</head>
<body>

  <!-- MENU -->
  <div id="menu">
    <div class="logo">KESKÉ ?</div>
    <div class="tagline">Choisis un ou plusieurs thèmes</div>
    <div class="barreMenu"><button id="toutRien" class="mini">Tout sélectionner</button></div>
    <div class="grille" id="listeThemes"></div>
    <button id="jouer" disabled>Choisis un thème</button>
  </div>

  <!-- JEU -->
  <div id="jeu">
    <div id="flash"></div>
    <header id="hud">
      <div class="chip" id="score">✓ 0</div>
      <div class="chip" id="nomTheme"></div>
      <button class="chip" id="retour">☰</button>
    </header>
    <div id="ecran">
      <div id="rotor">
        <div id="mot"></div>
        <div id="desc"></div>
      </div>
    </div>
    <footer id="actions">
      <button class="action passe" aria-label="Passe">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <button class="action trouve" aria-label="Trouvé">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </button>
    </footer>
  </div>

  <script>
    // ---------- thèmes de secours (si mots.json non chargeable) ----------
    var THEMES_DEFAUT = {
      "Cousinade": ["MULAN","SHREK","HULK","VOLDEMORT","TINTIN","OBÉLIX","SIMBA","JÉSUS","TRUMP","GORILLE","LAPIN","ÉLÉPHANT","TORTUE","BOURDON"],
      "Animaux": ["CHAT","CHIEN","LICORNE","DRAGON","PINGOUIN","REQUIN","GIRAFE","LION","TIGRE","LOUP","RENARD","OURS","SINGE","DAUPHIN"],
      "Nourriture & Boissons": ["PIZZA","BURGER","SUSHI","CROISSANT","CHOCOLAT","FROMAGE","GLACE","TACOS","CRÊPE","FRITES","KEBAB","CAFÉ"]
    };

    var C = {
      themes: "dt_themes", sel: "dt_selection", jeu: "dt_themes_joues",
      mots: "dt_mots", sac: "dt_sac", mot: "dt_mot", score: "dt_score", total: "dt_total"
    };

    var THEMES = {};
    var selection = {};          // { nomTheme: true } cochés dans le menu
    var themesJoues = [];        // thèmes de la partie en cours
    var MOTS = [], sac = [], score = 0, total = 0;

    var menuEl = document.getElementById("menu");
    var jeuEl  = document.getElementById("jeu");
    var listeThemesEl = document.getElementById("listeThemes");
    var jouerBtn = document.getElementById("jouer");
    var rotorEl = document.getElementById("rotor");
    var motEl  = document.getElementById("mot");
    var descEl = document.getElementById("desc");
    var scoreEl = document.getElementById("score");
    var nomThemeEl = document.getElementById("nomTheme");
    var flashEl = document.getElementById("flash");

    // sélection mémorisée
    try { selection = JSON.parse(localStorage.getItem(C.sel) || "{}") || {}; } catch (e) { selection = {}; }

    // ---------- charge les thèmes (cache -> puis mots.json) ----------
    try {
      var tc = JSON.parse(localStorage.getItem(C.themes) || "null");
      if (tc && Object.keys(tc).length) THEMES = tc;
    } catch (e) {}
    if (!Object.keys(THEMES).length) THEMES = THEMES_DEFAUT;
    construireMenu();

    fetch("mots.json", { cache: "no-store" })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data && data.themes && Object.keys(data.themes).length) {
          THEMES = data.themes;
          localStorage.setItem(C.themes, JSON.stringify(THEMES));
          construireMenu();
        }
      })
      .catch(function () {});

    // ---------- menu multi-sélection ----------
    function construireMenu() {
      listeThemesEl.innerHTML = "";
      for (var nom in THEMES) {
        (function (n) {
          var nb = (THEMES[n] || []).length;
          var b = document.createElement("button");
          b.className = "carte" + (selection[n] ? " on" : "");
          b.innerHTML =
            '<span class="check">✓</span>' +
            '<span class="titre">' + n + '</span>' +
            '<span class="n">' + nb + ' mots</span>';
          b.addEventListener("click", function () {
            if (selection[n]) delete selection[n]; else selection[n] = true;
            b.classList.toggle("on");
            localStorage.setItem(C.sel, JSON.stringify(selection));
            majJouer();
          });
          listeThemesEl.appendChild(b);
        })(nom);
      }
      majJouer();
    }

    function themesCoches() {
      var l = [];
      for (var n in selection) if (selection[n] && THEMES[n]) l.push(n);
      return l;
    }
    function nbMotsSel() {
      var t = 0, l = themesCoches();
      for (var i = 0; i < l.length; i++) t += (THEMES[l[i]] || []).length;
      return t;
    }
    function majJouer() {
      var l = themesCoches();
      if (!l.length) {
        jouerBtn.disabled = true;
        jouerBtn.textContent = "Choisis un thème";
      } else {
        jouerBtn.disabled = false;
        jouerBtn.textContent = "Jouer · " + l.length + (l.length > 1 ? " thèmes" : " thème") + " · " + nbMotsSel() + " mots";
      }
    }

    document.getElementById("toutRien").addEventListener("click", function () {
      var tout = themesCoches().length < Object.keys(THEMES).length;
      selection = {};
      if (tout) for (var n in THEMES) selection[n] = true;
      localStorage.setItem(C.sel, JSON.stringify(selection));
      this.textContent = tout ? "Tout désélectionner" : "Tout sélectionner";
      construireMenu();
    });

    // transforme une entrée (chaîne ou {mot,desc}) en objet normalisé
    function normItem(e) {
      if (e && typeof e === "object") {
        return { mot: String(e.mot || "").toUpperCase(), desc: String(e.desc || "") };
      }
      return { mot: String(e).toUpperCase(), desc: "" };
    }
    function motsDesThemes(noms) {
      var brut = [];
      for (var i = 0; i < noms.length; i++) brut = brut.concat(THEMES[noms[i]] || []);
      return brut.map(normItem);
    }

    // ---------- démarrage d'une partie ----------
    jouerBtn.addEventListener("click", function () {
      var l = themesCoches();
      if (!l.length) return;
      jouer(l);
    });

    function jouer(noms) {
      themesJoues = noms.slice();
      MOTS = motsDesThemes(noms);
      sac = []; score = 0; total = 0;
      localStorage.setItem(C.jeu, JSON.stringify(themesJoues));
      localStorage.setItem(C.mots, JSON.stringify(MOTS));
      localStorage.removeItem(C.mot);
      sauverEtat();
      ouvrirJeu();
      motSuivant();
    }

    function ouvrirJeu() {
      menuEl.classList.add("cache");
      jeuEl.style.display = "block";
      nomThemeEl.textContent = themesJoues.length === 1 ? themesJoues[0] : themesJoues.length + " thèmes";
      majScore();
      garderEveille();
      passerPleinEcran();
    }
    function ouvrirMenu() {
      jeuEl.style.display = "none";
      menuEl.classList.remove("cache");
      localStorage.removeItem(C.jeu);
      localStorage.removeItem(C.mot);
    }

    // ---------- sac mélangé (anti-répétition) ----------
    function melanger(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }
    function motSuivant() {
      if (!MOTS.length) return;
      if (!sac.length) sac = melanger(MOTS.slice());
      var item = normItem(sac.pop());
      localStorage.setItem(C.mot, JSON.stringify(item));
      sauverEtat();
      rendre(item);
    }

    // ---------- affichage + orientation adaptative ----------
    function rendre(item) {
      item = normItem(item);
      var mot = item.mot;
      motEl.innerHTML = "";
      for (var k = 0; k < mot.length; k++) {
        var d = document.createElement("span");
        d.className = "lettre";
        d.textContent = mot[k];
        motEl.appendChild(d);
      }
      descEl.textContent = item.desc || "";
      descEl.style.display = item.desc ? "block" : "none";
      ajuster();
    }
    // tactile (mobile/tablette) => mot penché à 90° ; souris (PC) => horizontal
    function estTactile() {
      return window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    }
    function ajuster() {
      rotorEl.style.transform = "none";
      var w = rotorEl.offsetWidth, h = rotorEl.offsetHeight;
      if (!w || !h) return;
      var availW = window.innerWidth  * 0.94;
      var availH = Math.max(window.innerHeight - 150, window.innerHeight * 0.55);
      if (estTactile()) {
        var s = Math.min(availW / h, availH / w);
        rotorEl.style.transform = "rotate(90deg) scale(" + s + ")";
      } else {
        var s2 = Math.min(availW / w, availH / h);
        rotorEl.style.transform = "scale(" + s2 + ")";
      }
    }

    // ---------- actions ----------
    function trouve() { score++; total++; majScore(); flash("vert");  vibrer(30);        motSuivant(); }
    function passe()  {          total++; majScore(); flash("rouge"); vibrer([15,40,15]); motSuivant(); }
    function majScore() { scoreEl.textContent = "✓ " + score; sauverEtat(); }
    function flash(c) {
      flashEl.className = ""; void flashEl.offsetWidth;
      flashEl.className = c + " on";
      setTimeout(function () { flashEl.className = c; }, 180);
    }
    function vibrer(p) { if (navigator.vibrate) navigator.vibrate(p); }

    // ---------- persistance ----------
    function sauverEtat() {
      try {
        localStorage.setItem(C.sac, JSON.stringify(sac));
        localStorage.setItem(C.score, score);
        localStorage.setItem(C.total, total);
      } catch (e) {}
    }

    // ---------- restauration après refresh ----------
    (function restaurer() {
      var j; try { j = JSON.parse(localStorage.getItem(C.jeu) || "null"); } catch (e) { j = null; }
      if (!Array.isArray(j) || !j.length) return;
      themesJoues = j;
      try { MOTS = JSON.parse(localStorage.getItem(C.mots) || "[]"); } catch (e) { MOTS = []; }
      if (!MOTS.length) MOTS = motsDesThemes(themesJoues);
      try { sac = JSON.parse(localStorage.getItem(C.sac) || "[]") || []; } catch (e) { sac = []; }
      score = parseInt(localStorage.getItem(C.score) || "0", 10) || 0;
      total = parseInt(localStorage.getItem(C.total) || "0", 10) || 0;
      ouvrirJeu();
      var m = localStorage.getItem(C.mot);
      if (m) {
        var it; try { it = JSON.parse(m); } catch (e) { it = null; }
        rendre(it && typeof it === "object" ? it : { mot: String(m), desc: "" });
      } else { motSuivant(); }
    })();

    // ---------- écran allumé ----------
    var wl = null;
    function garderEveille() {
      if (!("wakeLock" in navigator) || wl) return;
      navigator.wakeLock.request("screen").then(function (l) {
        wl = l; l.addEventListener("release", function () { wl = null; });
      }).catch(function () {});
    }
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") garderEveille();
    });

    // ---------- plein écran + paysage ----------
    function passerPleinEcran() {
      var el = document.documentElement;
      if (!document.fullscreenElement && el.requestFullscreen) {
        el.requestFullscreen().then(function () {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock("landscape").catch(function () {});
          }
        }).catch(function () {});
      }
    }

    // ---------- boutons jeu ----------
    document.querySelector(".action.trouve").addEventListener("click", trouve);
    document.querySelector(".action.passe").addEventListener("click", passe);
    document.getElementById("retour").addEventListener("click", ouvrirMenu);

    // ---------- swipe ----------
    var x0 = null, y0 = null;
    var zone = document.getElementById("ecran");
    zone.addEventListener("touchstart", function (e) {
      x0 = e.touches[0].clientX; y0 = e.touches[0].clientY;
    }, { passive: true });
    zone.addEventListener("touchend", function (e) {
      if (x0 === null) return;
      var dx = e.changedTouches[0].clientX - x0;
      var dy = e.changedTouches[0].clientY - y0;
      x0 = y0 = null;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) trouve(); else passe();
      }
    }, { passive: true });

    // ---------- clavier (test PC) ----------
    document.addEventListener("keydown", function (e) {
      if (jeuEl.style.display !== "block") return;
      if (e.code === "ArrowRight") { e.preventDefault(); trouve(); }
      if (e.code === "ArrowLeft")  { e.preventDefault(); passe(); }
      if (e.code === "Escape")     { ouvrirMenu(); }
    });

    // ---------- resize / rotation ----------
    window.addEventListener("resize", ajuster);
    window.addEventListener("orientationchange", function () { setTimeout(ajuster, 200); });
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(ajuster);
  </script>
</body>
</html>
